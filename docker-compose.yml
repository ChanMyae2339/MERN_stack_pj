
services:
  backend:
    image: thurain2339/backend:v1
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      - database

  frontend:
    image: thurain2339/frontend:v2
    ports:
      - "80:80"
    depends_on:
      - backend

  database:
    image: mongo:jammy
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: